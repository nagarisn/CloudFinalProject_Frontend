<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .chart-wrapper {
            height: 300px;
            width: 100%;
            margin-top: 20px;
        }

        .chart-wrapper canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body onload="loadPortalUser()">
    <div class="topbar">
        <div>Welcome, <span id="welcomeUser"></span></div>
        <button onclick="window.location.href='portal.html'">Back to Portal</button>
    </div>

    <div class="page-container">
        <div class="section">
            <h2>Explore Dashboard Insights</h2>

            <input type="number" id="dashboardHouseholdId" placeholder="Enter Household ID">
            <button onclick="loadDashboard()">Load Dashboard</button>

            <div class="dashboard-grid">
                <div class="metric-box" id="totalSpend">Total Spend</div>
                <div class="metric-box" id="totalBaskets">Total Baskets</div>
                <div class="metric-box" id="totalItems">Total Items</div>
                <div class="metric-box" id="avgSpend">Average Spend</div>
                <div class="metric-box" id="totalUnits">Total Units</div>
            </div>
        </div>

        <div class="section">
            <h3>Top 5 Products for Household</h3>
            <div id="topProducts"></div>
            <div class="chart-wrapper">
                <canvas id="topProductsChart"></canvas>
            </div>
        </div>

        <div class="section">
            <h3>Basket Analysis</h3>
            <div id="basketAnalysis"></div>
            <div class="chart-wrapper">
                <canvas id="basketChart"></canvas>
            </div>
        </div>

        <div class="section">
            <h3>Churn Risk Summary</h3>
            <div id="churnSummary"></div>
            <div class="chart-wrapper">
                <canvas id="churnChart"></canvas>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
